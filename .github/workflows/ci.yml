name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [clang-18, gcc-14]
    name: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          if [[ "${{ matrix.compiler }}" == clang-* ]]; then
            sudo apt-get install -y clang-18 clang-tidy-18 lld-18 ninja-build
            echo "CC=clang-18"  >> "$GITHUB_ENV"
            echo "CXX=clang++-18" >> "$GITHUB_ENV"
          else
            sudo apt-get install -y gcc-14 g++-14 ninja-build
            echo "CC=gcc-14"  >> "$GITHUB_ENV"
            echo "CXX=g++-14" >> "$GITHUB_ENV"
          fi

      - name: CPM source cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/CPM
          key: cpm-${{ runner.os }}-${{ hashFiles('cmake/CPM.cmake', '**/CMakeLists.txt') }}
          restore-keys: |
            cpm-${{ runner.os }}-

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.compiler }}-ci
          max-size: 500M

      - name: Configure
        env:
          CPM_SOURCE_CACHE: ${{ github.workspace }}/.cache/CPM
        run: |
          cmake -S . -B build -G Ninja \
            -DCITOR_BUILD_BENCHMARK=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

  pre-commit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1

  version-sync:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install commitizen
        run: pip install commitizen
      - name: Check every version_files target matches the project version
        run: |
          set -euo pipefail
          PROJECT_VERSION=$(cz version --project)
          echo "project version = ${PROJECT_VERSION}"
          # commitizen errors if any tracked file's version line is missing or
          # does not match the project version.
          cz bump --files-only --dry-run --increment PATCH

  clang-tidy:
    runs-on: ubuntu-24.04
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 clang-tidy-18 ninja-build
          echo "CC=clang-18"  >> "$GITHUB_ENV"
          echo "CXX=clang++-18" >> "$GITHUB_ENV"
      - name: CPM source cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/CPM
          key: cpm-${{ runner.os }}-${{ hashFiles('cmake/CPM.cmake', '**/CMakeLists.txt') }}
          restore-keys: |
            cpm-${{ runner.os }}-
      - name: Configure (with compile_commands.json)
        env:
          CPM_SOURCE_CACHE: ${{ github.workspace }}/.cache/CPM
        run: |
          cmake -S . -B build -G Ninja \
            -DCITOR_BUILD_BENCHMARK=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy across include/ tests/ benchmark/
        run: |
          mapfile -t FILES < <(git ls-files 'include/citor/**/*.h' 'tests/**/*.cpp' 'benchmark/**/*.cpp')
          python3 scripts/run_clang_tidy.py "${FILES[@]}"
