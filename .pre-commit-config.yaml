repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: mixed-line-ending
      - id: check-merge-conflict

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.3
    hooks:
      - id: clang-format
        types_or: [c++, c]
        exclude: ^single_include/

  - repo: https://github.com/BlankSpruce/gersemi
    rev: 0.27.0
    hooks:
      - id: gersemi

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: []

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.10
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: amalgamate-regenerate
        name: amalgamate-regenerate
        entry: scripts/amalgamate_hook.py
        language: system
        files: ^(include/citor/.*\.h|tools/amalgamate\.py)$
        pass_filenames: false

      - id: clang-tidy
        name: clang-tidy
        entry: python3 scripts/run_clang_tidy.py
        language: system
        types_or: [c++, c]
        exclude: ^single_include/
        pass_filenames: true

      - id: ctest
        name: ctest (full test suite)
        entry: python3 scripts/run_ctest.py
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true

      - id: packaging-tests
        name: packaging-tests (consume channels)
        entry: bash tests/packaging/run_packaging_tests.sh
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
